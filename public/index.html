<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamers Galaxy Billing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Branch Selector Screen -->
  <div id="branch-screen">
    <div id="branch-selector">
      <div class="brand-logo">🎮</div>
      <h1>Gamers Galaxy</h1>
      <p>Select your branch to continue</p>
      <div id="branch-list"></div>
    </div>
  </div>

  <!-- Main Dashboard (hidden until branch selected) -->
  <div id="dashboard" class="hidden">

    <header>
      <div class="header-left">
        <h1 id="branch-title">🎮 Gamers Galaxy</h1>
        <button id="switch-branch-btn" onclick="switchBranch()">Switch Branch</button>
      </div>
      <div id="today-summary">
        <span id="total-sessions">0 sessions</span>
        <span class="divider">|</span>
        <span id="total-revenue">UGX 0 today</span>
      </div>
    </header>

    <main>
      <div id="stations-grid"></div>

      <section class="history-section">
        <h2>Recent Sessions</h2>
        <div id="history-table-wrapper">
          <table id="history-table">
            <thead>
              <tr>
                <th>Station</th>
                <th>Console</th>
                <th>Duration</th>
                <th>Amount</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="history-body">
              <tr><td colspan="5" class="empty-row">No sessions yet today</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

  </div>

  <!-- Start Session Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3>Start Session</h3>
      <p id="modal-station-label"></p>
      <label>Select Console</label>
      <div class="console-buttons">
        <button class="console-btn" data-console="PS3">PS3<span>UGX 2,000/hr</span></button>
        <button class="console-btn" data-console="PS4">PS4<span>UGX 3,000/hr</span></button>
        <button class="console-btn" data-console="PS5">PS5<span>UGX 5,000/hr</span></button>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary" disabled>Start Session</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
